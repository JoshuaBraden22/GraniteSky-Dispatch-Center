<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carriers | GraniteSky Dispatch Center</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>

</head>

<body onload="requireLogin(); renderCarriers();">

<div class="app-shell">

<aside class="sidebar">

<div class="sidebar-logo">
<img src="logo.png" alt="GraniteSky Dispatching">
</div>

<nav class="sidebar-nav">

<a href="dashboard.html">Dashboard</a>

<a href="loads.html">Loads</a>

<a href="dispatch-board.html">Dispatch Board</a>

<a href="drivers.html">Drivers</a>

<a href="trucks.html">Trucks</a>

<a href="companies.html">Companies</a>

<a class="active" href="carriers.html">Carriers</a>

<a href="documents.html">Documents</a>

<a href="calendar.html">Calendar</a>

<a href="messages.html">Messages</a>

<a href="accounting.html">Accounting</a>

<button onclick="logout()">
Logout
</button>

</nav>

</aside>

<main class="main-content">

<div class="topbar">

<div>

<h1>Carrier Management</h1>

<p>
Store every carrier you dispatch.
</p>

</div>

</div>

<section class="panel">

<div class="panel-header">

<h2>Add Carrier</h2>

</div>

<form id="carrierForm" class="form-grid">

<input
id="carrierName"
placeholder="Carrier Name"
required>

<input
id="carrierMC"
placeholder="MC Number">

<input
id="carrierDOT"
placeholder="DOT Number">

<input
id="carrierContact"
placeholder="Contact Person">

<input
id="carrierPhone"
placeholder="Phone Number">

<input
id="carrierEmail"
placeholder="Email Address">

<input
id="carrierInsurance"
type="date">

<select id="carrierStatus">

<option>Active</option>

<option>Inactive</option>

<option>Pending</option>

</select>

<textarea
id="carrierNotes"
placeholder="Carrier Notes"></textarea>

<button
class="btn-primary"
type="submit">

Save Carrier

</button>

</form>

</section>

<section class="panel">

<div class="panel-header">

<h2>Saved Carriers</h2>

<button
class="small-btn danger"
onclick="clearCarriers()">

Clear All

</button>

</div>

<div class="table-wrap">

<table>

<thead>

<tr>

<th>Carrier</th>

<th>MC</th>

<th>DOT</th>

<th>Contact</th>

<th>Phone</th>

<th>Email</th>

<th>Insurance</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="carriersTable">

<tr>

<td colspan="9">

No carriers have been added yet.

</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

</div>

</body>
</html>
