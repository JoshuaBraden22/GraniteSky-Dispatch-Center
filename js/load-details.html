<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Load Details | GraniteSky Dispatch Center</title>

<link rel="stylesheet" href="style.css">

<script defer src="js/storage.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/layout.js"></script>
<script defer src="js/load-details.js"></script>
</head>

<body>

<div class="app-shell">

<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="logo.png" alt="GraniteSky Dispatching">
  </div>

  <nav class="sidebar-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="loads.html">Loads</a>
    <a href="dispatch-board.html">Dispatch Board</a>
    <a href="drivers.html">Drivers</a>
    <a href="trucks.html">Trucks</a>
    <a href="companies.html">Companies</a>
    <a href="carriers.html">Carriers</a>
    <a href="documents.html">Documents</a>
    <a href="calendar.html">Calendar</a>
    <a href="messages.html">Messages</a>
    <a href="accounting.html">Accounting</a>
    <button onclick="logout()">Logout</button>
  </nav>
</aside>

<main class="main-content">

  <div class="topbar">
    <div>
      <h1 id="detailLoadTitle">Load Details</h1>
      <p>Complete shipment record.</p>
    </div>

    <a href="loads.html" class="btn-primary">Back to Loads</a>
  </div>

  <section class="stat-grid">
    <div class="stat-card">
      <span>Status</span>
      <strong id="detailStatus">-</strong>
    </div>

    <div class="stat-card">
      <span>Revenue</span>
      <strong id="detailRevenue">$0.00</strong>
    </div>

    <div class="stat-card">
      <span>Miles</span>
      <strong id="detailMiles">0</strong>
    </div>

    <div class="stat-card">
      <span>Rate Per Mile</span>
      <strong id="detailRPM">$0.00</strong>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>Shipment Information</h2>
    </div>

    <div class="table-wrap">
      <table>
        <tbody id="loadDetailsTable">
          <tr>
            <td>Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

</div>

</body>
</html>
