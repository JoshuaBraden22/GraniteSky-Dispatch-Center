<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loads | GraniteSky Dispatch Center</title>

<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>

<body onload="requireLogin(); showUserName(); renderLoads();">

<div class="app-shell">

    <aside class="sidebar">

        <div class="sidebar-logo">
            <img src="logo.png" alt="GraniteSky Dispatching">
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a class="active" href="loads.html">Loads</a>
            <a href="#">Carriers</a>
            <a href="#">Drivers</a>
            <a href="#">Trucks</a>
            <a href="#">Documents</a>
            <a href="#">Invoices</a>
            <a href="#">Settings</a>

            <button onclick="logout()">Logout</button>
        </nav>

    </aside>

    <main class="main-content">

        <div class="topbar">
            <div>
                <h1>Load Management</h1>
                <p>Create and manage all active freight.</p>
            </div>
        </div>

        <div class="panel">

            <div class="panel-header">
                <h2>Add New Load</h2>
            </div>

            <form id="loadForm" class="form-grid">

                <input id="loadNumber" placeholder="Load Number" required>

                <input id="driver" placeholder="Driver">

                <input id="pickup" placeholder="Pickup City" required>

                <input id="delivery" placeholder="Delivery City" required>

                <input id="pickupDate" type="date">

                <input id="deliveryDate" type="date">

                <input id="rate" type="number" placeholder="Rate">

                <select id="status">
                    <option>Pickup Today</option>
                    <option>In Transit</option>
                    <option>Delivered</option>
                </select>

                <textarea
                    id="notes"
                    placeholder="Dispatcher Notes"></textarea>

                <button class="btn-primary" type="submit">
                    Save Load
                </button>

            </form>

        </div>

        <div class="panel">

            <div class="panel-header">

                <h2>Current Loads</h2>

                <button
                    class="small-btn danger"
                    onclick="clearLoads()">

                    Clear All

                </button>

            </div>

            <div class="table-wrap">

                <table>

                    <thead>

                        <tr>

                            <th>Load #</th>
                            <th>Lane</th>
                            <th>Driver</th>
                            <th>Pickup</th>
                            <th>Delivery</th>
                            <th>Rate</th>
                            <th>Status</th>
                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="loadsTable">

                        <tr>

                            <td colspan="8">

                                No loads have been added yet.

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

</body>
</html>
