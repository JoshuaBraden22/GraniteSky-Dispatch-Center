<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loads | GraniteSky Dispatch Center</title>

<link rel="stylesheet" href="style.css">

<script defer src="js/storage.js"></script>
<script defer src="js/auth.js"></script>
<script defer src="js/layout.js"></script>
<script defer src="js/loads.js"></script>

</head>

<body>

<div class="app-shell">

<!-- Sidebar -->

<aside class="sidebar">

<div class="sidebar-logo">
<img src="logo.png" alt="GraniteSky Dispatching">
</div>

<nav class="sidebar-nav">

<a href="dashboard.html">Dashboard</a>

<a href="loads.html" class="active">Loads</a>

<a href="dispatch-board.html">Dispatch Board</a>

<a href="drivers.html">Drivers</a>

<a href="trucks.html">Trucks</a>

<a href="companies.html">Companies</a>

<a href="carriers.html">Carriers</a>

<a href="documents.html">Documents</a>

<a href="calendar.html">Calendar</a>

<a href="messages.html">Messages</a>

<a href="accounting.html">Accounting</a>

<button onclick="logout()">
Logout
</button>

</nav>

</aside>

<!-- Main -->

<main class="main-content">

<div class="topbar">

<div>

<h1>Load Management</h1>

<p>
Create, assign and manage freight loads.
</p>

</div>

</div>

<!-- Add Load -->

<section class="panel">

<div class="panel-header">

<h2>Create New Load</h2>

</div>

<form id="loadForm" class="form-grid">

<input
id="loadNumber"
placeholder="Load Number"
required>

<select id="driver">
<option value="">Select Driver</option>
</select>

<input
id="pickup"
placeholder="Pickup City"
required>

<input
id="delivery"
placeholder="Delivery City"
required>

<input
type="date"
id="pickupDate">

<input
type="date"
id="deliveryDate">

<input
type="number"
id="rate"
placeholder="Load Rate">

<select id="status">

<option>Pickup Today</option>

<option>In Transit</option>

<option>Delivered</option>

</select>

<textarea
id="notes"
placeholder="Dispatch Notes"></textarea>

<button
class="btn-primary"
type="submit">

Save Load

</button>

</form>

</section>

<!-- Load Table -->

<section class="panel">

<div class="panel-header">

<h2>Current Loads</h2>

<button
class="small-btn danger"
onclick="clearLoads()">

Clear All

</button>

</div>

<div class="table-wrap">

<table>

<thead>

<tr>

<th>Load #</th>

<th>Lane</th>

<th>Driver</th>

<th>Truck</th>

<th>Pickup</th>

<th>Delivery</th>

<th>Rate</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="loadsTable">

<tr>

<td colspan="9">

No loads have been created yet.

</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

</div>

</body>

</html>
