<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GraniteSky Dispatch Center | Login</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body class="login-body">

    <main class="login-wrap">

        <section class="login-card center-card">

            <img src="logo.png" class="main-logo" alt="GraniteSky Dispatching Logo">

            <h1>GraniteSky Dispatch Center</h1>

            <p>Secure access for GraniteSky employees and carriers.</p>

            <form id="loginForm">

                <label for="email">Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >

                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >

                <button type="submit" class="btn-primary">
                    Sign In
                </button>

            </form>

        </section>

    </main>

</body>
</html>
