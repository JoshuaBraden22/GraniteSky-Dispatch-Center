<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GraniteSky Dispatch Center | Login</title>

<link rel="stylesheet" href="style.css">

<script defer src="js/storage.js?v=5000"></script>
<script defer src="js/auth.js?v=5000"></script>

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <img src="logo.png" alt="GraniteSky Dispatch Center" class="login-logo">

        <h1>GraniteSky Dispatch Center</h1>

        <p>
            Sign in to continue.
        </p>

        <form id="loginForm">

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

            </div>

            <button
                type="submit"
                class="btn-primary">

                Login

            </button>

        </form>

        <div class="login-footer">

            <small>

                GraniteSky Dispatch Center
                <br>
                Secure Login

            </small>

        </div>

    </div>

</div>

</body>

</html>
