<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraniteSky Dispatch Center | Login</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>

<body class="login-body">

  <main class="login-wrap">
    <section class="login-card">
      <div class="brand-mark">GS</div>

      <h1>GraniteSky Dispatch Center</h1>
      <p>Secure dispatcher and carrier access.</p>

      <form id="loginForm">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="dispatcher@granitesky.com" required />

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required />

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="demo-logins">
        <p><strong>Demo Dispatcher:</strong> admin@granitesky.com / admin123</p>
        <p><strong>Demo Carrier:</strong> carrier@granitesky.com / carrier123</p>
      </div>
    </section>
  </main>

</body>
</html>
