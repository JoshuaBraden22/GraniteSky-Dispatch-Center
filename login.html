<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | GraniteSky Dispatch Center</title>

<link rel="stylesheet" href="style.css">

<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script defer src="js/firebase.js?v=1"></script>
<script defer src="js/storage.js?v=7000"></script>
<script defer src="js/auth.js?v=7000"></script>
</head>

<body class="login-body">

<div class="login-container">

  <section class="login-card">

    <img src="logo.png" alt="GraniteSky Dispatch Center" class="login-logo">

    <h1>GraniteSky Dispatch Center</h1>

    <p>Sign in to continue.</p>

    <form id="loginForm">

      <label>Email</label>
      <input id="email" type="email" placeholder="Email Address" required>

      <label>Password</label>
      <input id="password" type="password" placeholder="Password" required>

      <button class="btn-primary" type="submit">Login</button>

    </form>

  </section>

</div>

</body>
</html>
